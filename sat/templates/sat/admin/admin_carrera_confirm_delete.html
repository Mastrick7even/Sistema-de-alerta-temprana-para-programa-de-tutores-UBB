{% extends 'layouts/base.html' %}
{% block content %}
<div class="header bg-primary pb-6">
  <div class="container-fluid">
    <div class="header-body">
      <div class="row align-items-center py-4">
        <div class="col">
          <h6 class="h2 text-white d-inline-block mb-0">Eliminar Carrera</h6>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="container-fluid mt--6">
  <div class="row justify-content-center">
    <div class="col-lg-5">
      <div class="card border-danger">
        <div class="card-header bg-gradient-danger text-white">
          <h4 class="mb-0 text-white"><i class="fas fa-exclamation-triangle mr-2"></i>Confirmar eliminación</h4>
        </div>
        <div class="card-body text-center py-4">
          <p class="lead">¿Estás seguro de que deseas eliminar la carrera?</p>
          <h4 class="text-danger font-weight-bold">{{ carrera.nombre }}</h4>
          <p class="text-muted text-sm">Esta acción no se puede deshacer.</p>
        </div>
        <div class="card-footer text-right">
          <a href="{% url 'admin-carrera-list' %}" class="btn btn-secondary mr-2">Cancelar</a>
          <form method="POST" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">
              <i class="fas fa-trash mr-1"></i> Sí, eliminar
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
  {% include "includes/footer.html" %}
</div>
{% endblock %}
